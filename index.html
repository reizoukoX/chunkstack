<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ChunkStack</title>
  <!-- Data pool (edit data.js to customize questions) -->
  <script src="data.js"></script>
  <!-- Transformers.js for Whisper AI -->
  <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
    window.pipeline = pipeline;
    window.env = env;
  </script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      overscroll-behavior: none
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #f5f4ef;
      color: #2c2c2c;
      min-height: 100dvh
    }

    button {
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all .15s
    }

    button:active {
      transform: scale(.97)
    }

    .glass {
      background: rgba(255,255,255,.82);
      border: 1px solid #e8e4dc
    }

    .glass2 {
      background: #fff;
      border: 1px solid #dddad4
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(18px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes popIn {
      0% {
        transform: scale(.93)
      }

      55% {
        transform: scale(1.05)
      }

      100% {
        transform: scale(1)
      }
    }

    @keyframes heard {
      0% {
        transform: scale(1)
      }

      35% {
        transform: scale(1.1)
      }

      100% {
        transform: scale(1)
      }
    }

    @keyframes pulse1 {
      0% {
        transform: scale(1);
        opacity: .55
      }

      100% {
        transform: scale(1.75);
        opacity: 0
      }
    }

    @keyframes pulse2 {
      0% {
        transform: scale(1);
        opacity: .35
      }

      100% {
        transform: scale(2.3);
        opacity: 0
      }
    }

    @keyframes wave {

      0%,
      100% {
        height: 5px
      }

      50% {
        height: 22px
      }
    }

    @keyframes lastPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, .5)
      }

      70% {
        box-shadow: 0 0 0 8px rgba(239, 68, 68, 0)
      }

      100% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0)
      }
    }

    .anim-slide {
      animation: slideUp .35s ease-out
    }

    .anim-fade {
      animation: fadeIn .4s ease-out
    }

    .anim-pop {
      animation: popIn .35s ease-out
    }

    .anim-heard {
      animation: heard .4s ease-out
    }

    .mic-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 88px;
      height: 88px;
      cursor: pointer;
      margin-bottom: 24px;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .mic-ring {
      position: absolute;
      border-radius: 50%;
      width: 72px;
      height: 72px;
      pointer-events: none
    }

    .mic-ring.r1 {
      animation: pulse1 1.5s ease-out infinite
    }

    .mic-ring.r2 {
      animation: pulse2 1.5s ease-out .4s infinite
    }

    .mic-btn {
      position: relative;
      z-index: 1;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      transition: all .3s
    }

    .wave-row {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 28px;
      margin-top: 6px
    }

    .wbar {
      width: 4px;
      border-radius: 4px;
      background: #618f1e
    }

    .wbar:nth-child(1) {
      animation: wave .9s ease-in-out infinite 0s
    }

    .wbar:nth-child(2) {
      animation: wave .9s ease-in-out infinite .18s
    }

    .wbar:nth-child(3) {
      animation: wave .9s ease-in-out infinite .36s
    }

    .wbar:nth-child(4) {
      animation: wave .9s ease-in-out infinite .18s
    }

    .wbar:nth-child(5) {
      animation: wave .9s ease-in-out infinite 0s
    }

    /* Phase 2: English Prompts */
    .prompt-type {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(44,44,44,.4);
      margin-bottom: 4px;
      font-weight: 700;
    }
    .prompt-main {
      font-size: 20px;
      font-weight: 700;
      color: #2c2c2c;
      line-height: 1.2;
    }
    .chunk-hint-badge.wh, .score-hint-badge.wh { background: #618f1e; border: 1px solid rgba(255,255,255,0.2); color: #fff; }
    .chunk-hint-badge.vocab, .score-hint-badge.vocab { background: #c8b850; border: 1px solid rgba(255,255,255,0.2); color: #3a2c00; }
    .chunk-said { font-size: 12px; color: rgba(40,85,8,.85); margin-top: 6px; font-style: italic; }
    .chunk-model-hint { font-size: 11px; color: rgba(44,44,44,.35); margin-top: 8px; padding: 5px 10px; border: 1px dashed rgba(44,44,44,.15); border-radius: 3px; letter-spacing: .02em; }
    .core-en { font-size: 18px; font-weight: 600; color: #618f1e; margin-top: 4px; }
    .last-chunk-tag {
      font-size: 9px;
      padding: 1px 5px;
      background: #ef4444;
      border-radius: 4px;
      margin-left: 6px;
      font-weight: 800;
      animation: popIn 0.5s ease-out;
    }

    #app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column
    }

    .screen {
      display: none;
      flex: 1;
      flex-direction: column
    }

    .screen.active {
      display: flex
    }

    .home-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      max-width: 440px;
      margin: 0 auto;
      width: 100%
    }

    .logo-lockup {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px
    }
    .logo-lockup svg { flex-shrink: 0 }
    .app-title {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -.03em;
      margin: 0 0 4px;
      text-align: left;
      font-feature-settings: "ss01"
    }
    .app-title span { color: #618f1e }

    .app-sub {
      font-size: 12px;
      color: rgba(44,44,44,.45);
      margin: 0;
      text-align: left;
      letter-spacing: .01em
    }

    .stats-row-mini {
      margin-top: 14px;
      font-size: 11px;
      color: rgba(44,44,44,.38);
      text-align: center;
      letter-spacing: .02em;
      width: 100%
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 700;
      color: #618f1e;
      margin-bottom: 8px
    }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      width: 100%
    }

    .filter-btn {
      flex: 1;
      padding: 10px 4px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #2e4c0c;
      background: rgba(97,143,30,.08)
    }

    .filter-btn.sel {
      background: var(--sb, #618f1e) !important;
      color: #fff !important;
      box-shadow: 0 4px 20px var(--sb, #618f1e) !important;
    }

    .start-btn {
      width: 100%;
      padding: 16px;
      border-radius: 10px;
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      margin-top: 4px;
      background: linear-gradient(135deg, #618f1e, #426010);
      box-shadow: 0 6px 24px rgba(97,143,30,.28)
    }

    .mode-hint {
      font-size: 12px;
      color: #618f1e;
      text-align: center;
      margin-top: 8px;
      min-height: 18px
    }

    .prac-header {
      padding: 16px 16px 8px
    }

    .prac-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px
    }

    .end-btn {
      font-size: 13px;
      font-weight: 700;
      color: #618f1e;
      padding: 8px 14px;
      border-radius: 6px
    }

    .level-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 10px;
      color: #fff
    }

    .prog-counter {
      font-size: 13px;
      font-family: monospace;
      color: rgba(44,44,44,.5)
    }

    .prog-bar-wrap {
      height: 3px;
      border-radius: 4px;
      background: rgba(44,44,44,.08);
      overflow: hidden
    }

    .prog-bar {
      height: 100%;
      border-radius: 4px;
      background: #618f1e;
      transition: width .5s
    }

    .grammar-tag {
      text-align: center;
      margin: 8px 0 4px
    }

    .grammar-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 10px;
      background: rgba(97,143,30,.12);
      color: #426010
    }

    .prac-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 20px 24px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch
    }

    .prac-body-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      min-height: 100%
    }

    .chunks-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px
    }

    .chunk-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      margin-left: 4px
    }

    .chunk-plus {
      color: #618f1e;
      font-size: 18px;
      font-weight: 900
    }

    .chunk-hint-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 10px;
      background: rgba(97,143,30,.12);
      color: #426010
    }

    .chunk-card {
      border-radius: 10px;
      padding: 16px 20px
    }

    .chunk-card.core {
      background: #fff;
      border: 1px solid #dddad4
    }

    .chunk-card.extra {
      background: rgba(97,143,30,.05);
      border: 1px solid rgba(97,143,30,.18);
      margin-left: 16px
    }

    .core-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: #618f1e;
      margin-bottom: 4px
    }

    .chunk-ja {
      font-weight: 600;
      line-height: 1.4;
      margin: 0;
      letter-spacing: -.01em
    }

    .last-chunk-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 10px;
      background: rgba(239, 68, 68, .25);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, .3);
      animation: popIn .35s ease-out, lastPulse 1.5s ease-out 0s 3
    }

    .voice-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 28px;
      width: 100%
    }

    .transcript-area {
      min-height: 40px;
      text-align: center;
      margin-bottom: 16px;
      width: 100%;
      padding: 0 16px
    }

    .transcript-pill {
      display: inline-block;
      border-radius: 8px;
      padding: 8px 16px
    }

    .interim-text {
      font-size: 13px;
      font-style: italic;
      color: rgba(97,143,30,.75)
    }

    .heard-text {
      font-size: 13px;
      font-weight: 600;
      color: #3a5c28
    }

    .listen-hint {
      font-size: 12px;
      color: rgba(44,44,44,.35)
    }

    .mic-label-text {
      font-size: 12px;
      font-weight: 500;
      margin-top: 6px;
      color: rgba(44,44,44,.4);
      text-align: center
    }

    .skip-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 11px;
      color: rgba(44,44,44,.3)
    }

    .key-badge {
      font-size: 10px;
      font-family: monospace;
      padding: 2px 7px;
      border-radius: 5px;
      background: rgba(44,44,44,.07)
    }

    .manual-hint {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 32px;
      font-size: 13px;
      color: rgba(44,44,44,.4)
    }

    .dots-row {
      display: flex;
      gap: 8px;
      margin-top: 18px
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transition: background .3s
    }

    .answer-zone {
      width: 100%;
      animation: fadeIn .4s ease-out
    }

    .answer-label {
      text-align: center;
      margin-bottom: 14px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: #618f1e
    }

    .answer-card {
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 14px;
      border: 1px solid rgba(44,44,44,.1);
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.55;
      color: #618f1e
    }

    .answer-slash {
      color: #c8b850;
      font-weight: 900
    }

    .ja-ref {
      border-radius: 7px;
      padding: 10px 16px;
      margin-bottom: 16px;
      text-align: center;
      font-size: 13px;
      color: #618f1e
    }

    /* ── 採点セクション ── */
    .score-section {
      width: 100%;
      margin-bottom: 16px
    }

    .score-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: #618f1e;
      margin-bottom: 10px;
      text-align: center
    }

    .score-row {
      border-radius: 7px;
      padding: 10px 14px;
      margin-bottom: 8px
    }

    .score-row.ok {
      background: rgba(16, 185, 129, .12);
      border: 1px solid rgba(16, 185, 129, .2)
    }

    .score-row.ng {
      background: rgba(239, 68, 68, .10);
      border: 1px solid rgba(239, 68, 68, .2)
    }

    .score-row.skip {
      background: rgba(44,44,44,.03);
      border: 1px solid rgba(44,44,44,.09)
    }

    .score-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px
    }

    .score-hint-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 5px;
      background: rgba(97,143,30,.12);
      color: #426010
    }

    .score-badge-ok {
      font-size: 11px;
      font-weight: 700;
      color: #1f6e4a
    }

    .score-badge-ng {
      font-size: 11px;
      font-weight: 700;
      color: #a82020
    }

    .score-badge-skip {
      font-size: 11px;
      color: rgba(44,44,44,.3)
    }

    .score-user {
      font-size: 12px;
      color: rgba(44,44,44,.6);
      font-style: italic;
      margin-bottom: 3px
    }

    .score-correction {
      font-size: 12px;
      color: #9a7800;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tts-btn {
      background: rgba(200,184,80,.14);
      border: 1px solid rgba(200,184,80,.32);
      color: #9a7800;
      border-radius: 6px;
      padding: 1px 7px;
      font-size: 13px;
      line-height: 1.6;
      flex-shrink: 0;
    }
    .tts-btn:hover { background: rgba(200,184,80,.26); }

    /* ── AI Feedback ── */
    #ai-feedback {
      margin-top: 14px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.93);
      border: 1px solid rgba(97,143,30,.2);
      border-radius: 7px;
      font-size: 13px;
      line-height: 1.7;
      color: #2d1b69;
      display: none;
    }
    #ai-feedback .ai-fb-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      color: rgba(65,110,15,.85);
      margin-bottom: 8px;
    }
    #ai-feedback p {
      margin: 0 0 7px 0;
    }
    #ai-feedback p:last-child {
      margin-bottom: 0;
    }

    /* ─────────────────── */
    .ctrl-row {
      display: flex;
      gap: 10px;
      margin-bottom: 18px
    }

    .ctrl-btn {
      flex: 1;
      padding: 10px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      color: #2e4c0c;
      background: rgba(97,143,30,.08)
    }

    .ctrl-btn.on {
      background: #618f1e;
      color: #fff
    }

    .breakdown {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 22px
    }

    .breakdown-details {
      margin-bottom: 16px;
    }
    .breakdown-details > summary {
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      color: rgba(65,110,15,.8);
      letter-spacing: .06em;
      padding: 6px 2px;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .breakdown-details > summary::-webkit-details-marker { display: none; }
    .breakdown-details > summary::before {
      content: '▶';
      font-size: 9px;
      transition: transform .2s;
      opacity: .7;
    }
    .breakdown-details[open] > summary::before {
      transform: rotate(90deg);
    }
    .breakdown-details .breakdown {
      margin-top: 8px;
      margin-bottom: 0;
    }
    .breakdown-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      border-radius: 7px;
      padding: 10px 14px
    }

    .breakdown-hint {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 10px;
      background: rgba(97,143,30,.12);
      color: #426010;
      white-space: nowrap;
      margin-top: 2px
    }

    .breakdown-en {
      font-size: 13px;
      font-weight: 700;
      color: #2c2c2c
    }

    .breakdown-ja {
      font-size: 11px;
      color: #618f1e;
      margin-top: 1px
    }

    .next-btn {
      width: 100%;
      padding: 15px;
      border-radius: 9px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: #618f1e;
      letter-spacing: .03em;
      margin-top: 4px
    }
    .next-btn:hover { background: #5a6b46 }

    .done-score-card {
      background: #fff;
      border: 1px solid #dddad4;
      border-radius: 10px;
      padding: 28px 56px;
      margin-bottom: 32px;
      text-align: center
    }
    .done-score-pct {
      font-size: 60px;
      font-weight: 800;
      color: #618f1e;
      letter-spacing: -.04em;
      line-height: 1
    }
    .done-score-label {
      font-size: 13px;
      font-weight: 600;
      color: rgba(44,44,44,.5);
      margin-top: 6px;
      letter-spacing: .04em;
      text-transform: uppercase
    }
    .done-score-detail {
      font-size: 13px;
      color: rgba(44,44,44,.38);
      margin-top: 8px
    }

    .done-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      max-width: 440px;
      margin: 0 auto;
      width: 100%;
      text-align: center
    }

    .done-anim-wrap {
      margin-bottom: 8px;
      line-height: 0
    }

    .done-title {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 8px
    }

    .done-sub {
      color: #618f1e;
      margin-bottom: 32px
    }

    .done-stats {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 36px
    }

    .done-stat {
      border-radius: 8px;
      padding: 14px 24px
    }

    .done-stat-n {
      font-size: 32px;
      font-weight: 700
    }

    .done-stat-l {
      font-size: 11px;
      margin-top: 2px
    }

    .home-btn {
      width: 100%;
      padding: 16px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #618f1e, #426010);
      box-shadow: 0 6px 24px rgba(97,143,30,.28)
    }
  </style>
</head>

<body>
  <!-- ONBOARDING MODAL -->
  <div id="onboarding" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(15,23,42,.92);backdrop-filter:blur(8px);flex-direction:column;align-items:center;justify-content:center;padding:24px">

  <script>
    /* ═══════════════════════════════════════════════════════════
       DATA POOL
       LV1: SV/SVC/進行形 + 前置詞のみ (3-4チャンク)
       LV2: 幅広いSV + 前置詞/to不定詞/関係代名詞(制限)/比較/that節/when節 (3-5チャンク)
            ※コア文に tag を付与し、関係代名詞・that節を自然なペアのみに制限
       LV3: 全文法 + 分詞構文/カンマwhich (5-7チャンク)
            ※分詞構文はポジティブ・状態系で「どのコアにも自然につながる」ものに絞る
       ═══════════════════════════════════════════════════════════ */
    let DATA = null; // loaded from data.json at bootstrap

    const LEVEL_COLORS = { 1: "#3a7c50", 2: "#c8b850", 3: "#b03020" };
    const HAS_SPEECH = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let transcriber = null;
    let whisperLoading = false;
    let whisperReady = false;
    let whisperFailed = false;

    /* ── State ── */
    const _initPrefs = (function(){ try { return JSON.parse(localStorage.getItem('cd-prefs')||'{}'); } catch(e){ return {}; } })();
    let S = {
      mode: HAS_SPEECH ? 'voice' : 'tap',
      jeMode: _initPrefs.jeMode !== undefined ? _initPrefs.jeMode : true,
      filterLevel: 'level' in _initPrefs ? _initPrefs.level : 1,
      qCount: _initPrefs.qCount || 5,
      queue: [],
      qIdx: 0,
      chunkIdx: 1,
      showAnswer: false,
      slashOn: false,
      micState: 'idle',
      micPermissionError: false,
      transcript: '',
      interim: '',
      sessionResults: [],
      chunkOk: 0,
      chunkTotal: 0,
      // 採点用: chunkIdx(0始まり)→ユーザーが発話したテキスト
      transcriptHistory: {},
      // Stress Detection
      isWhisperMode: false,
      audioChunks: [],
      audioStream: null,
      audioMimeType: '',
      mediaRecorder: null,
      audioCtx: null,
      analyser: null,
      dataArray: null,
      source: null,
      startTime: 0,
      peakVal: 0,
      peakTime: 0,
      volumeHistory: [],
    };

    /* ── Persistence ── */
    function loadStats() {
      try { return JSON.parse(localStorage.getItem('cd-stats') || '{"totalQ":0,"sessions":0,"chunkOk":0,"chunkTotal":0}'); }
      catch { return { totalQ: 0, sessions: 0, chunkOk: 0, chunkTotal: 0 }; }
    }
    function saveStats(stats) { localStorage.setItem('cd-stats', JSON.stringify(stats)); }
    function loadPrefs() { try { return JSON.parse(localStorage.getItem('cd-prefs')||'{}'); } catch(e){ return {}; } }
    function savePrefs(upd) { const p = loadPrefs(); Object.assign(p, upd); localStorage.setItem('cd-prefs', JSON.stringify(p)); }

    /* ── Difficulty Bias (直近の評価に基づき難易度を自動調整) ── */
    function getDifficultyBias() {
      // -1: 短いパターン優先, 0: 通常, +1: 長いパターン優先
      // 直近6問中 bad 3以上 → やさしめ / perfect 4以上 → チャレンジ
      try {
        const recent = JSON.parse(localStorage.getItem('cd-recent') || '[]');
        if (recent.length < 4) return 0;
        const last6 = recent.slice(-6);
        const bads = last6.filter(r => r === 'bad').length;
        const perfects = last6.filter(r => r === 'perfect').length;
        if (bads >= 3) return -1;
        if (perfects >= 4) return 1;
        return 0;
      } catch { return 0; }
    }
    function saveRecentRating(rating) {
      try {
        const recent = JSON.parse(localStorage.getItem('cd-recent') || '[]');
        recent.push(rating);
        if (recent.length > 20) recent.splice(0, recent.length - 20);
        localStorage.setItem('cd-recent', JSON.stringify(recent));
      } catch {}
    }

    /* ── Helpers ── */
    function g(id) { return document.getElementById(id); }
    function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function esc(s) { if (s === undefined || s === null) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    /* ═══════════════════════════════════════════════════
       QUESTION GENERATION
       ═══════════════════════════════════════════════════ */
    // Normalize prompt for dedup: "When? (Weather)" → "When?", "Where? (City)" → "Where?"
    function basePrompt(p) {
      if (!p) return '';
      return p.replace(/\s*\(.*?\)$/, '').trim();
    }

    function generateQuestion(levelNum, sessionUsedEns = new Set()) {
      const levelKey = `level_${levelNum}`;
      const levelData = DATA[levelKey];

      // Pick random core
      const core = levelData.core_sentences[Math.floor(Math.random() * levelData.core_sentences.length)];
      const coreTags = core.tags || [];

      // 難易度バイアスに基づきパターンを選択（短め/通常/長め）
      const bias = getDifficultyBias();
      let patternPool = levelData.patterns;
      if (bias !== 0 && patternPool.length > 1) {
        const sorted = [...patternPool].sort((a, b) => a.length - b.length);
        const cut = Math.ceil(sorted.length / 2);
        patternPool = bias < 0 ? sorted.slice(0, cut) : sorted.slice(sorted.length - cut);
      }
      const pattern = patternPool[Math.floor(Math.random() * patternPool.length)];

      const chunks = [
        { type: "core", ja: core.ja, en: core.en, hint: "S+V", tags: coreTags }
      ];
      let previousCat = "core"; // allowedAfter 追跡用

      // Semantic meta-tags: excluded from topic matching, used for cross-slot mutual exclusion
      const TEMPORAL_TAGS = ["past", "pres", "habitual", "fut", "hypo"];
      const SEMANTIC_META_TAGS = ["passive", "impersonal", "momentary", "one_time", "recurring", "morning_act", "morning_time"];
      const coreTemporal = coreTags.find(t => TEMPORAL_TAGS.includes(t));

      // Tracks semantic meta-tags chosen so far (for mutual exclusion across slots)
      const chosenSemanticTags = new Set();
      // Tracks en-values already picked (prevents "just for fun just for fun" duplicates)
      const chosenEnValues = new Set();
      // Tracks prompts already used (prevents same フリ e.g. "When?" appearing twice)
      const chosenPrompts = new Set();
      // Tracks semantic meaning tags chosen so far (prevents e.g. two "manner" chunks)
      const chosenSemTags = new Set();

      pattern.forEach(cat => {
        const options = levelData.additions[cat];
        if (!options) return;

        // ── Slot-level semantic exclusions (Animacy hierarchy + Aspect) ──────────
        // (A) Dangling participle: passive/impersonal subject cannot anchor a participial phrase
        if (cat === 'participle' && coreTags.includes('passive')) return;
        // (B) Agent presupposition: passive core + purposive to_infinitive (LV3 only — all use "I/my")
        if (cat === 'to_infinitive' && levelNum === 3 && coreTags.includes('passive')) return;
        // (C) Impersonal core + personal-purpose to_infinitive (LV2)
        if (cat === 'to_infinitive' && coreTags.includes('impersonal')) return;
        // (D) Speaker-relation relative clause requires a specific, chosen referent
        if (cat === 'relative_obj' && coreTags.includes('impersonal')) return;
        // (E) Counterfactual/irrealis core: comma_which continuation is aspectually incoherent
        if (cat === 'comma_which' && coreTags.includes('hypo')) return;

        // ── Item-level semantic pre-filter ────────────────────────────────────────
        // Person filter: if core subject is third-person, exclude first-person additions
        const coreIsFirstPerson = /\bI\b|\bmy\b|\bme\b|\bwe\b|\bour\b|\bmyself\b/i.test(core.en);
        const semanticPool = options.filter(opt => {
          // allowedAfter: このチャンクの前に来るカテゴリを制限
          if (opt.allowedAfter && !opt.allowedAfter.includes(previousCat)) return false;
          const optTags = opt.tags || [];
          // Block first-person additions on third-person cores (e.g. "by myself" after "She is kind")
          if (!coreIsFirstPerson && /\bI\b|\bmy\b|\bme\b|\bmyself\b/i.test(opt.en)) return false;
          // Momentaneous "now" core + recurring/habitual addition → temporal contradiction
          if (optTags.includes('recurring') && coreTags.includes('momentary')) return false;
          // Cross-slot: one_time ("for the first time") and recurring ("whenever") are mutually exclusive
          if (optTags.includes('recurring') && chosenSemanticTags.has('one_time')) return false;
          if (optTags.includes('one_time') && chosenSemanticTags.has('recurring')) return false;
          // Redundancy: core already implies morning → don't add "in the morning"
          if (optTags.includes('morning_time') && coreTags.includes('morning_act')) return false;
          return true;
        });

        // ── Tense + topic filter (applied on semanticPool base) ───────────────────
        const compatible = semanticPool.filter(opt => {
          const optTags = opt.tags || [];
          const optTemporal = optTags.find(t => TEMPORAL_TAGS.includes(t));

          // 1. Tense Check: If both specify tense, they must match.
          if (optTemporal && coreTemporal && optTemporal !== coreTemporal) return false;

          // 2. Universal bypass (semantic checks already passed above)
          if (optTags.includes("universal")) return true;

          // 3. Topic Check: exclude semantic meta-tags from topic matching
          const optTopics = optTags.filter(t => !TEMPORAL_TAGS.includes(t) && !SEMANTIC_META_TAGS.includes(t));
          if (optTopics.length === 0) return true; // tense-only: universal within that tense
          return optTopics.some(t => coreTags.includes(t));
        });

        // Fallback: tense-compatible from semanticPool
        const source = compatible.length > 0 ? compatible : semanticPool.filter(opt => {
          const optTags = opt.tags || [];
          const optTemporal = optTags.find(t => TEMPORAL_TAGS.includes(t));
          return !(optTemporal && coreTemporal && optTemporal !== coreTemporal);
        });

        // Final fallback: any semantically safe option, then any option
        const rawSource = source.length > 0 ? source : (semanticPool.length > 0 ? semanticPool : options);
        // Dedup: prefer items not already chosen (same en or same prompt フリ)
        const dedupedSource = rawSource.filter(opt =>
          !chosenEnValues.has(opt.en) &&
          !chosenPrompts.has(opt.prompt) &&
          !chosenPrompts.has(basePrompt(opt.prompt))
        );
        // Semantic conflict filter: exclude chunks whose semTag is already used in this question
        const semTagFiltered = dedupedSource.filter(opt =>
          !opt.semTag || !chosenSemTags.has(opt.semTag)
        );
        // Session reuse filter: prefer chunks not already used in this session
        const notSessionUsed = semTagFiltered.filter(opt => !sessionUsedEns.has(opt.en));
        // Priority: notSessionUsed > semTagFiltered > dedupedSource > rawSource
        const finalSource = notSessionUsed.length > 0 ? notSessionUsed :
                            semTagFiltered.length > 0 ? semTagFiltered :
                            dedupedSource.length > 0  ? dedupedSource  : rawSource;
        const choice = finalSource[Math.floor(Math.random() * finalSource.length)];
        chosenEnValues.add(choice.en);
        if (choice.prompt) {
          chosenPrompts.add(choice.prompt);
          chosenPrompts.add(basePrompt(choice.prompt)); // also block variants e.g. "When? (X)"
        }
        if (choice.semTag) chosenSemTags.add(choice.semTag);

        // Track semantic meta-tags for subsequent slot exclusions
        if (choice.tags) {
          if (choice.tags.includes('one_time')) chosenSemanticTags.add('one_time');
          if (choice.tags.includes('recurring')) chosenSemanticTags.add('recurring');
        }

        previousCat = cat; // 次スロット用に更新
        chunks.push({
          type: cat,
          ja: choice.ja,
          en: choice.en,
          hint: choice.hint || choice.prompt,
          prompt: choice.prompt,
          promptType: choice.promptType,
          tags: choice.tags
        });
      });

      const hints = [...new Set(chunks.slice(1).map(c => c.hint))];
      return {
        level: levelNum,
        chunks: chunks,
        grammar_focus: hints.join("・")
      };
    }

    function generateSession() {
      const levels = S.filterLevel ? [S.filterLevel] : [1, 2, 3];
      const usedCores = new Set();
      const sessionUsedEns = new Set(); // tracks addition chunks used across this session
      return Array.from({ length: S.qCount }, () => {
        let q, attempts = 0;
        do {
          q = generateQuestion(pickRandom(levels), sessionUsedEns);
          attempts++;
        } while (usedCores.has(q.chunks[0].en) && attempts < 10);
        usedCores.add(q.chunks[0].en);
        // Record all addition chunks used in this question
        q.chunks.slice(1).forEach(c => sessionUsedEns.add(c.en));
        return q;
      });
    }

    /* ── Screens ── */
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      g('screen-' + id).classList.add('active');
      window.scrollTo(0, 0); // reset scroll on Android / mobile
    }
    function goHome() { speechSynthesis.cancel(); killRec(); showScreen('home'); refreshHome(); }

    /* ── Onboarding ── */
    const OB_STEPS = [
      {
        emoji: '🥋',
        title: 'チャンクって何？',
        body: '英語を「意味のかたまり（チャンク）」で話す練習です。\n\n例：<b>I went to a cafe</b> ＋ <b>yesterday</b> ＋ <b>with my friend</b>\n\nチャンクをつなぐ感覚を身につけると、英語がスムーズに出てくるようになります。'
      },
      {
        emoji: '👆',
        title: 'こんなふうに使います',
        body: '① コア文が表示される<br>② チャンクのヒント（<b>Why?</b> / <b>When?</b> など）が出る<br>③ 英語で話す or タップして進める<br>④ 最後に正解文と発話チェックを確認！'
      },
      {
        emoji: '🎙️',
        title: '音声 or タップを選べます',
        body: '<b>音声入力</b>：マイクボタンを長押しして英語を話す。スピーキング力アップに◎<br><br><b>タップ</b>：画面をタップして進める。まず内容を確認したいときに。<br><br>いつでも切り替えられます。'
      }
    ];
    let obStep = 0;

    function obRender() {
      const s = OB_STEPS[obStep];
      g('ob-emoji').textContent = s.emoji;
      g('ob-title').textContent = s.title;
      g('ob-body').innerHTML = s.body.replace(/\n/g, '<br>');
      g('ob-next').textContent = obStep < OB_STEPS.length - 1 ? '次へ →' : 'はじめる！';
      const dots = g('ob-step-dots');
      dots.innerHTML = OB_STEPS.map((_, i) =>
        `<div style="width:8px;height:8px;border-radius:50%;background:${i === obStep ? '#618f1e' : 'rgba(44,44,44,.12)'}"></div>`
      ).join('');
    }

    function obNext() {
      if (obStep < OB_STEPS.length - 1) { obStep++; obRender(); }
      else obSkip();
    }

    function obSkip() {
      localStorage.setItem('cd-ob-done', '1');
      g('onboarding').style.display = 'none';
    }

    function maybeShowOnboarding() {
      if (localStorage.getItem('cd-ob-done')) return;
      obStep = 0; obRender();
      g('onboarding').style.display = 'flex';

    /* ── Whisper AI Initialization ── */
    async function initWhisper() {
      // Guard: skip if already in-flight, done, or permanently failed
      if (whisperLoading || whisperReady || whisperFailed) return;
      // Guard: CDN module may not have loaded yet (ES module is async)
      if (typeof window.pipeline !== 'function') return;

      whisperLoading = true;
      renderIntentChallenge(); // Show "loading…" spinner immediately
      console.log("Initializing Whisper AI...");
      try {
        const timeout = new Promise((_, reject) =>
          setTimeout(() => reject(new Error('Whisper init timed out after 45s')), 45000));
        transcriber = await Promise.race([
          window.pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny.en'),
          timeout,
        ]);
        whisperReady = true;
        whisperLoading = false;
        console.log("Whisper AI Ready.");
        renderIntentChallenge(); // Swap spinner → challenge button
      } catch (err) {
        console.error("Whisper AI Initialization failed:", err);
        whisperLoading = false;
        whisperFailed = true;
        renderIntentChallenge(); // Hide section cleanly on failure
      }
    }

    /* ═══════════════════════════════════════════════════
       PRACTICE FLOW
       ═══════════════════════════════════════════════════ */
    function startPractice() {
      S.queue = generateSession();
      S.qIdx = 0; S.chunkIdx = 1; S.showAnswer = false;
      S.micState = 'idle'; // ensure mic icon is correct on session start
      S.transcript = ''; S.interim = ''; S.sessionResults = []; S.transcriptHistory = {};
      S.chunkOk = 0; S.chunkTotal = 0;
      showScreen('practice'); renderPractice();
      // PTT mode: do NOT auto-start recognition here.
      // The user will press the mic button to start; auto-starting before any
      // user gesture triggers the permission dialog immediately on file:// origins.
    }

    function cq() { return S.queue[S.qIdx]; }

    function renderPractice() {
      const q = cq(); if (!q) return;
      const badge = g('p-level-badge');
      badge.textContent = `Lv.${q.level}`; badge.style.background = LEVEL_COLORS[q.level];

      g('answer-zone').style.display = S.showAnswer ? 'block' : 'none';
      g('chunks-list').style.display = S.showAnswer ? 'none' : 'flex';

      g('voice-zone').style.display = (!S.showAnswer && S.mode === 'voice') ? 'flex' : 'none';
      g('manual-hint').style.display = (!S.showAnswer && S.mode === 'tap') ? 'flex' : 'none';
      const inner = g('prac-body-inner');
      if (inner) inner.style.justifyContent = S.showAnswer ? 'flex-start' : 'center';
      if (S.showAnswer) renderAnswer();

    }

    function renderChunks() {
      const q = cq(); const list = g('chunks-list'); list.innerHTML = '';
      for (let i = 0; i < S.chunkIdx; i++) {
        const c = q.chunks[i]; if (!c) break;
        const isCore = i === 0, isLast = i === S.chunkIdx - 1;
        const isLastChunk = i === q.chunks.length - 1;
        const wrap = document.createElement('div');
        wrap.className = 'chunk-wrap' + (isLast ? ' anim-slide' : '');
        if (!isCore) {
          const meta = document.createElement('div'); meta.className = 'chunk-meta';
          const badgeLabel = S.jeMode ? (c.ja || c.prompt || c.hint) : (c.prompt || c.hint);
          let metaHTML = `<span class="chunk-plus">＋</span><span class="chunk-hint-badge ${c.promptType === 'Wh-Question' ? 'wh' : 'vocab'}">${esc(badgeLabel)}</span>`;
          if (isLastChunk) metaHTML += `<span class="last-chunk-tag">🔥 Last Chunk!</span>`;
          meta.innerHTML = metaHTML;
          wrap.appendChild(meta);
        }
        const card = document.createElement('div'); card.className = 'chunk-card ' + (isCore ? 'core' : 'extra');
        if (isCore) {
          // コアは常に日本語を表示 → どちらのモードでも日→英サイトトランスレーション
          const coreDisplay = c.ja || c.en;
          card.innerHTML = `<div class="core-label">Core Sentence</div><div class="core-en">${esc(coreDisplay)}</div>`;
        } else {
          // J→E mode: show Japanese; hint mode: show English prompt
          const mainText = S.jeMode
            ? `<span style="color:#fbbf24;font-size:17px;font-weight:700">${esc(c.ja)}</span>`
            : c.promptType === 'VocabDrop'
              ? `<span style="color:#fbbf24;font-size:15px;font-weight:600;opacity:0.9">${esc(c.ja)}</span>`
              : (c.prompt || `<span style="opacity:0.5">${esc(c.type)}</span>`);
          const typeLabel = S.jeMode ? '日→英' : (c.promptType || 'Addition');
          const said = S.transcriptHistory[i];

            ? `<div class="chunk-said">🗣 「${esc(said)}」</div>`
            : '';
          card.innerHTML = `<div class="prompt-type">${esc(typeLabel)}</div><div class="prompt-main">${mainText}</div>${saidHTML}`;

    function renderDots() {
      const q = cq(); const row = g('dots-row'); row.innerHTML = '';
      q.chunks.forEach((_, i) => {
        const d = document.createElement('div'); d.className = 'dot';
        d.style.background = i < S.chunkIdx ? '#618f1e' : 'rgba(44,44,44,.1)';

    // Build final sentence: use user's transcript for ok-scored chunks, model answer for others
    function getAssembledSentence(q) {
      return q.chunks.map((c, i) => {
        if (i === 0) return c.en; // core always uses model text
        const t = S.transcriptHistory[i];
        if (t && chunkIsOk(t, c)) return t;
        return c.en;
      }).join(' ');
    }

    function renderAnswer() {
      const q = cq();
      const card = g('answer-card');
      card.textContent = getAssembledSentence(q);
      // ja-ref: model-answer chunks → Japanese (c.ja), user-spoken chunks → their English
      if (g('ja-ref')) g('ja-ref').textContent = q.chunks.map((c, i) => {
        if (i === 0) return c.ja; // core always shows Japanese
        const t = S.transcriptHistory[i];
        return (t && chunkIsOk(t, c)) ? t : c.ja;
      }).join('、');
      // Reset breakdown to collapsed on each new answer
      const det = g('breakdown-details');
      if (det) det.removeAttribute('open');
      g('breakdown').innerHTML = q.chunks.map(c =>
        `<div class="breakdown-row glass"><span class="breakdown-hint">${esc(c.hint)}</span><div><div class="breakdown-en">${esc(c.en)}</div><div class="breakdown-ja">${esc(c.ja)}</div></div></div>`
      ).join('');

    function updateManualHint() {
      const q = cq(); if (!q) return;
      g('manual-hint-text').textContent = S.chunkIdx >= q.chunks.length ? 'タップで解答表示' : 'タップでチャンク追加';
    }

    /* ── Advance ── */
    function advance() {
      if (S.showAnswer) return;
      const now = Date.now();
      if (now - lastAdvanceAt < 700) return;
      lastAdvanceAt = now;
      clearTimeout(advanceTimer); advanceTimer = null;
      const q = cq();
      if (S.transcript) S.transcriptHistory[S.chunkIdx - 1] = S.transcript;
      if (S.chunkIdx < q.chunks.length) {
        // ── 完全切り離し: 旧 rec を殺してからチャンク遷移 ──
        recBlocked = true;
        const old = rec; rec = null;
        try { if (old) old.abort(); } catch (_) {}
        S.chunkIdx++; S.transcript = ''; S.interim = '';
        S.micState = 'idle';
        renderChunks(); renderDots(); renderVoiceUI(); updateManualHint();
        // 新チャンク用に rec を新規起動
        setTimeout(() => {
          recBlocked = false;
          if (recWanted && !S.showAnswer) startRec();
        }, 350);
      } else {
        S.showAnswer = true;
        // マイクを確実に止める → Android で TTS と競合しないように
        recWanted = false;
        const _lastRec = rec; rec = null;
        try { if (_lastRec) _lastRec.abort(); } catch (_) {}
        const _aiFbSentence = getAssembledSentence(q);
        renderPractice();
        setTimeout(() => playNativeAudio(_aiFbSentence), 600);
        getAiFeedback(_aiFbSentence, q);
      }
    }

    let ttsPlaying = false;
    function ttsStop() {
      speechSynthesis.cancel();
      ttsPlaying = false;
      document.querySelectorAll('.tts-btn').forEach(b => b.textContent = '🔊');
      const sb = g('speak-btn'); if (sb) sb.textContent = '🔊 読み上げ';
    }
    function playNativeAudio(text, el) {
      if (ttsPlaying) { ttsStop(); return; }
      ttsStop(); // clear any queued speech
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = 0.9;
      ttsPlaying = true;
      if (el) el.textContent = '⏹️';
      u.onend = u.onerror = () => { ttsPlaying = false; ttsStop(); };
      speechSynthesis.speak(u);
    }

    // Triple-layer guard against double-advance:
    //   micPressedAt  — suppresses body clicks within 800ms of mic PRESS
    //   micReleasedAt — suppresses body clicks within 600ms of mic RELEASE
    //   lastAdvanceAt — debounces advance() itself (700ms), catches any other path
    let micPressedAt = 0;
    let micReleasedAt = 0;
    let lastAdvanceAt = 0;
    function onBodyClick() {
      const now = Date.now();
      if (now - micPressedAt  < 800)  return; // block click from mic press
      if (now - micReleasedAt < 600)  return; // block click from mic release
      if (now - lastAdvanceAt < 1500) return; // block click if advance() fired recently (voice auto-advance)
      if (!S.showAnswer) advance();
    }
    function endPractice() { speechSynthesis.cancel(); goHome(); }

    /* ═══════════════════════════════════════════════════
       SCORING — 発話チェック
       キーワード一致率で「修正不要」/「修正案あり」を判定
       ═══════════════════════════════════════════════════ */
    const STOP_WORDS = new Set([
      'the', 'a', 'an', 'is', 'are', 'was', 'were', 'be', 'been', 'being',
      'to', 'of', 'in', 'at', 'on', 'by', 'for', 'from', 'up', 'into', 'about',
      'my', 'your', 'his', 'her', 'its', 'our', 'their', 'this', 'that',
      'i', 'you', 'he', 'she', 'we', 'they', 'it', 'me', 'him', 'us', 'them',
      'and', 'but', 'or', 'so', 'not', 'no', 'do', 'did', 'does',
      'have', 'has', 'had', 'will', 'would', 'can', 'could', 'should', 'may', 'might',
      'with', 'as', 'if', 'when', 'while', 'just', 'very', 'really',
    ]);

    function normalizeText(s) {
      return s.toLowerCase().replace(/[.,!?'"']/g, '').replace(/\s+/g, ' ').trim();
    }
    function stem(w) {
      return w.replace(/ing$/, '').replace(/ed$/, '').replace(/tion$/, '').replace(/ly$/, '').replace(/s$/, '');
    }
    function contentWords(text) {
      return normalizeText(text).split(/\s+/).filter(w => w.length > 2 && !STOP_WORDS.has(w)).map(stem);
    }

    /* ── Claude AI Feedback ── */
    // ⚠️ APIキーをここに入力してください（sk-ant-...）
    const CLAUDE_API_KEY = '';

    // Grammar type → Japanese label
    const CHUNK_TYPE_LABEL = {
      preposition:   '前置詞句',
      when_clause:   '時の副詞節',
      to_infinitive: 'to不定詞句',
      comparison:    '比較表現',
      relative_obj:  '関係代名詞節',
      comma_which:   '非制限関係詞節',
      participle:    '分詞構文',
    };

    async function getAiFeedback(sentence, q) {
      const el = g('ai-feedback');
      const textEl = g('ai-feedback-text');
      console.log('[AI-FB] getAiFeedback called. sentence=', JSON.stringify(sentence));

      if (!el || !textEl) { console.warn('[AI-FB] DOM elements not found'); return; }
      el.style.display = 'block';

      // Build structured chunk description

      if (q && q.chunks) {
        q.chunks.forEach((c, i) => {

            chunkDesc += 'コア文: ' + c.en + '\n';
          } else {
            const typeJa = CHUNK_TYPE_LABEL[c.type] || c.type;
            const used = S.transcriptHistory[i];
            const isOk = used && chunkIsOk(used, c);
            const actual = isOk ? used : c.en;
            const src = isOk ? '（学習者の発話）' : '（モデル答）';
            chunkDesc += 'チャンク' + i + ' [' + typeJa + ']: ' + actual + ' ' + src + '\n';
          }
        });
      }

      const prompt = [
        '【練習の概要】',
        'これは「チャンキング練習」という英語口頭表現トレーニングの結果です。',
        '学習者はコア文に文法チャンクを声に出して追加していきました。',
        '「（学習者の発話）」は実際に話した内容、「（モデル答）」はスキップまたは不正解のため自動補完された模範答案です。',
        '',
        '【今回の文の構造】',
        chunkDesc,
        '【組み立てられた文全体】',
        sentence,
        '',
        '【フィードバックのルール】',
        '・評価対象は「（学習者の発話）」のチャンクのみ。「（モデル答）」には一切コメント不要',
        '・最初の1文は必ず学習者の実際の発話を引用した具体的なポジティブコメントにする',
        '・「よく頑張りました」「素晴らしい」など内容のない褒め言葉は禁止',
        '・例：「〜の接続が自然です。」「〜をうまく使えています。」など発話内容を具体的に褒める',
        '・問題のある「（学習者の発話）」チャンクがあれば、チャンクごとに改行して1文ずつ指摘する',
        '・1文あたり最大40字。全体で最大3文（ポジティブ1文＋指摘最大2文）',
        '・問題がなければポジティブ1文のみで終わる',
        '・「フィードバック」「評価」などの見出しや記号（#・*・【】など）は使わない',
        '・改行以外の装飾なしの平文で答える',
      ].join('\n');

      console.log('[AI-FB] fetching via proxy...');
      const t0 = Date.now();

      try {
        const res = await fetch('/.netlify/functions/claude', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-haiku-4-5',
            max_tokens: 700,
            messages: [{ role: 'user', content: prompt }]
          })
        });

        const ms = Date.now() - t0;
        console.log('[AI-FB] status=' + res.status + ' (' + ms + 'ms)');

          el.style.display = 'none'; return;

        console.log('[AI-FB] text preview:', text.slice(0, 100));

          // Render: each non-empty line becomes a <p> with 💡 prefix

            .replace(/&/g, '&amp;')

            .replace(/>/g, '&gt;');

      }
