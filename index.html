    // Wh-Question chunks: validate by structural pattern (any valid temporal/locative/etc. phrase)
    // rather than comparing to the specific model answer.
    function evaluateWhQuestion(transcript, prompt) {
      const t = normalizeText(transcript);
      if (!t) return false;
      const words = t.split(/\s+/);
      if (words.length < 2) return false; // need at least 2 words
      const p = prompt.toLowerCase();
      const w0 = words[0];
      if (p.startsWith('when')) {
        return /^(after|before|when|whenever|while|during|at|in|on|over|last|this|next|until|since|throughout|by|every|each)\b/.test(t);
      }
      if (p.startsWith('where')) {
        return /^(at|in|near|by|around|next to|behind|outside|inside|on|under|above|across|between)\b/.test(t);
      }
      if (p.startsWith('why')) {
        return /^(to |for |because|in order|so that)/.test(t);
      }
      if (p.startsWith('who with')) {
        return /^with\b/.test(t);
      }
      if (p.startsWith('how long')) {
        return /^(for|over|during|throughout|within)\b/.test(t);
      }
      if (p.startsWith(', which')) {
        return /^,?\s*which\b/.test(t);
      }
      // Generic Wh-Question: any 2+ word utterance
      return words.length >= 2;
    }

    // Unified OK check: uses structural validation for Wh-Questions, similarity for VocabDrop
    function chunkIsOk(transcript, chunk) {
      if (!transcript || !transcript.trim()) return false;
      // まず chunk.en と照合（模範解答と一致すれば常にOK）
      if (evaluateTranscript(transcript, chunk.en).ok === true) return true;
      // Wh-Question: 構造的に正しい別解も許容
      if (chunk.promptType === 'Wh-Question' && chunk.prompt) {
        return evaluateWhQuestion(transcript, chunk.prompt);
      }
      return false;
    }

    function evaluateTranscript(userText, expectedText) {
      if (!userText || !userText.trim()) return { ok: null };
      const uNorm = normalizeText(userText);
      const eNorm = normalizeText(expectedText);
      // Exact / substring match
      if (uNorm === eNorm || uNorm.includes(eNorm) || eNorm.includes(uNorm)) return { ok: true };
      // Structural match: same grammatical opener means the student used the right construction
      // e.g. "when we had lunch" ≈ "when I was at home"  /  "with my friend" ≈ "with my family"
      // (to-infinitive, when/while-clause, with/for/at phrase, etc.)
      const STRUCTURE_WORDS = new Set([
        'when','while','whenever','because','since','although','though','even','if','unless',
        'to','for','with','at','in','on','by','from','after','before','until','as',
        'which','who','what','where','how','that',
      ]);
      const firstU = uNorm.split(' ')[0];
      const firstE = eNorm.split(' ')[0];
      if (firstU && firstE && firstU === firstE && STRUCTURE_WORDS.has(firstU)) return { ok: true };
      // Keyword overlap fallback
      const eKeys = contentWords(expectedText);
      const uKeys = contentWords(userText);
      if (eKeys.length === 0) return { ok: true };
      let hits = 0;
      for (const ek of eKeys) {
        if (uKeys.some(uk => uk === ek || uk.startsWith(ek.slice(0, -1)) || ek.startsWith(uk.slice(0, -1)))) hits++;
      }
      return { ok: hits / eKeys.length >= 0.55 };
    }

    function renderScoring() {
      const q = cq(); const el = g('score-rows'); if (!el) return;
      // 音声モード以外・履歴が全くない場合は表示しない
      const hasAny = Object.keys(S.transcriptHistory).length > 0;
      if (!hasAny) { el.innerHTML = '<div style="text-align:center;font-size:12px;color:rgba(44,44,44,.3);padding:8px 0">（音声入力なし）</div>'; renderIntentChallenge(); return; }
      let html = '';
      // additions のみ採点（index 1以降）
      for (let i = 1; i < q.chunks.length; i++) {
        const chunk = q.chunks[i];
        const transcript = S.transcriptHistory[i] || '';
        const ptClass = chunk.promptType === 'Wh-Question' ? 'wh' : 'vocab';
        if (!transcript) {
          html += `<div class="score-row skip">
        <div class="score-meta"><span class="score-hint-badge ${ptClass}">${esc(S.jeMode ? (chunk.ja || chunk.hint) : chunk.hint)}</span><span class="score-badge-skip">（スキップ）</span></div>
        <div class="score-correction"><button class="tts-btn" data-text="${esc(chunk.en)}" onclick="playNativeAudio(this.dataset.text,this)">🔊</button>💡 ${esc(chunk.en)}</div>
      </div>`;
          continue;
        }
        const badgeText = S.jeMode ? (chunk.ja || chunk.prompt || chunk.hint) : (chunk.prompt || chunk.hint);
        const isOk = chunkIsOk(transcript, chunk);
        if (isOk) {
          html += `<div class="score-row ok">
        <div class="score-meta"><span class="score-hint-badge ${ptClass}">${esc(badgeText)}</span></div>
        <div class="score-user">「${esc(transcript)}」</div>
      </div>`;
        } else {
          html += `<div class="score-row ng">
        <div class="score-meta"><span class="score-hint-badge ${ptClass}">${esc(badgeText)}</span><span class="score-badge-ng">💡 参考例あり</span></div>
        <div class="score-user">「${esc(transcript)}」</div>
        <div class="score-correction"><button class="tts-btn" data-text="${esc(chunk.en)}" onclick="playNativeAudio(this.dataset.text,this)">🔊</button>モデル例: ${esc(chunk.en)}</div>
      </div>`;
        }
      }
      el.innerHTML = html;
      renderIntentChallenge();
    }

    function renderIntentChallenge() {
      const section = g('stress-section');
      const resultEl = g('stress-result');
      const hintEl = g('stress-hint');

      // Failed to load → hide entirely so the user isn't left confused
      if (whisperFailed) { section.style.display = 'none'; return; }

      // Still loading → show a spinner message
      if (whisperLoading) {
        section.style.display = 'block';
        resultEl.innerHTML = '<span style="color:rgba(44,44,44,.5);font-size:13px">⏳ Whisper AI 読込中...</span>';
        hintEl.textContent = '';
        return;
      }

      // CDN not yet ready (window.pipeline not loaded) → hide until next call
      if (!whisperReady) { section.style.display = 'none'; return; }

      // Ready → show challenge button
      const q = cq();
      if (!q) { section.style.display = 'none'; return; }
      section.style.display = 'block';

      // Pick a content word for the user to emphasize
      const words = contentWords(q.chunks.map(c => c.en).join(' '));
      const target = words[Math.floor(Math.random() * words.length)] || "word";

      resultEl.innerHTML = `
        <div id="intent-feedback" style="min-height:1.4em;font-size:13px;text-align:center;color:rgba(44,44,44,.6);margin-bottom:6px"></div>
        <button class="ctrl-btn" id="stress-btn"
          onpointerdown="startIntentChallenge(event)" onpointerup="stopIntentChallenge(event)"
          ontouchstart="startIntentChallenge(event)" ontouchend="stopIntentChallenge(event)"
          style="margin:6px auto;display:block;background:#f59e0b;touch-action:none">
          🎙️ 「${esc(target)}」を強調して発音
        </button>`;
      hintEl.textContent = "ボタンを長押しして、指定された単語を強く発音してください";
      S.intentTarget = target;
    }

    async function startIntentChallenge(e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      const fb = g('intent-feedback');
      if (fb) fb.textContent = '🎙️ 聞き取り中...';
      const btn = g('stress-btn');
      if (btn) { btn.style.background = '#ef4444'; btn.style.opacity = '0.85'; }
      S.isWhisperMode = true;
      startWhisperAudio();
    }

    async function stopIntentChallenge(e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      const fb = g('intent-feedback');
      if (fb) fb.textContent = '⏳ 解析中...';
      const btn = g('stress-btn');
      if (btn) { btn.style.background = '#f59e0b'; btn.style.opacity = '1'; }
      const result = await stopWhisperAudio();
      S.isWhisperMode = false;

      if (result.error) {
        if (fb) fb.textContent = 'エラー: ' + result.error;
        return;
      }

      drawStressVisuals(result);

      const isMatch = result.stressedWord && result.stressedWord.toLowerCase().includes(S.intentTarget.toLowerCase());
      if (fb) {
        if (isMatch) {
          fb.innerHTML = `<span style="color:#10b981">🎯 Excellent! 「${esc(result.stressedWord)}」が強調されました</span>`;
        } else {
          fb.innerHTML = `<span style="color:#f59e0b">惜しい！ 最も強かったのは「${esc(result.stressedWord || '?')}」でした</span>`;
        }
      }
    }

    function drawStressVisuals(result) {
      const canvas = g('stress-visualizer');
      const ctx = canvas.getContext('2d');
      // Set internal dimensions
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw volume curve
      ctx.lineWidth = 2;
      ctx.strokeStyle = "#10b981";
      ctx.beginPath();
      const totalTime = S.volumeHistory[S.volumeHistory.length - 1].time;
      S.volumeHistory.forEach((v, i) => {
        const x = (v.time / totalTime) * canvas.width;
        const y = canvas.height - (v.dB / 50) * canvas.height;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();

      // Draw word boundaries and highlight user's target
      result.words.forEach(w => {
        const x1 = (w.start / totalTime) * canvas.width;
        const x2 = (w.end / totalTime) * canvas.width;
        
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.beginPath(); ctx.moveTo(x1, 0); ctx.lineTo(x1, canvas.height); ctx.stroke();

        ctx.font = "10px sans-serif";
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.fillText(w.text, x1 + 2, 12);

        if (w.text.toLowerCase().includes(S.intentTarget.toLowerCase())) {
          ctx.fillStyle = "rgba(245, 158, 11, 0.2)";
          ctx.fillRect(x1, 0, x2 - x1, canvas.height);
        }
      });

      // Draw peak as a yellow line
      if (S.peakTime) {
        const px = (S.peakTime / totalTime) * canvas.width;
        ctx.strokeStyle = "#fbbf24";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, canvas.height); ctx.stroke();
      }
    }

    /* ── Voice ── */
    let rec = null;
    let recWanted = false;
    let advanceTimer = null;  // pending auto-advance timeout
    let recBlocked = false;   // true during chunk transition (prevents audio bleed)

    function startRec() {
      if (!SpeechRec || S.micPermissionError) return;
      if (rec) return; // Already running or starting

      const r = new SpeechRec();
      r.lang = 'en-US'; r.continuous = true; r.interimResults = true; r.maxAlternatives = 1;

      r.onstart = () => { if (rec === r && recWanted) setMicState('listening'); };
      r.onresult = (e) => {
        if (!recWanted) return;
        if (recBlocked) return; // チャンク遷移中は無視
        if (rec !== r || S.mode !== 'voice' || S.showAnswer || S.micState === 'paused') return;
        if (!g('screen-practice').classList.contains('active')) return;
        let interim = '', final = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) final += t; else interim += t;
        }
        if (interim) { S.interim = interim; renderVoiceUI(); }
        if (final) {
          // Android は同じ resultIndex を累積テキストで上書きして送る → 常に最新で上書き
          // 750ms タイマーで本当の最終結果を待つ
          S.transcript = final.trim();
          S.interim = ''; setMicState('heard');
          // 新しい final が来るたびにタイマーをリセット → 本当に無音になってから advance
          clearTimeout(advanceTimer);
          advanceTimer = setTimeout(() => {
            advanceTimer = null;
            advance();
          }, 750);
        }
      };
      r.onerror = (e) => {
        if (rec !== r) return;
        console.error('Speech recognition error:', e.error);
        if (e.error === 'not-allowed') {
          S.micPermissionError = true;
          recWanted = false;
          setMicState('error');
          return;
        }
        // Silence noise errors that happen on quick release
        if (e.error === 'no-speech' || e.error === 'aborted') return;
      };
      r.onend = () => {
        if (rec === r) rec = null;
        const now = Date.now();
        const tooFast = (now - (S.lastStartAttempt || 0)) < 1000;
        // recBlocked=true の間は advance() 側が再起動を管理するので触らない
        if (recBlocked) return;
        if (recWanted && S.mode === 'voice' && !S.micPermissionError && !tooFast) {
          setTimeout(startRec, 200);
        } else if (!S.micPermissionError) {
          setMicState('idle');
        }
      };
      rec = r;
      try {
        r.start();
        S.lastStartAttempt = Date.now();
      } catch (e) {
        console.warn('rec start error:', e);
        rec = null;
        setMicState('error');
      }
    }

    function killRec() {
      recWanted = false;
      const old = rec; rec = null;
      try { if (old) old.abort(); } catch { }
      if (S.micState !== 'error') setMicState('idle');
    }

    function handleMicPress(e) {
      if (e) {
        e.preventDefault();
        e.stopPropagation();
        // Capture pointer: all subsequent pointer events route to this element,
        // even if finger slips off — prevents stray clicks reaching prac-body
        try { if (e.pointerId != null) e.currentTarget.setPointerCapture(e.pointerId); } catch(_) {}
      }
      micPressedAt = Date.now(); // guard: block body-click within 800ms of press
      if (S.micPermissionError) {
        // User acknowledged error — reset and try once more
        S.micPermissionError = false;
        recWanted = true;
        startRec();
        return;
      }
      if (S.showAnswer) return;
      recWanted = true;
      if (rec) {
        // Instance already running (kept alive from previous press) — just flip UI
        setMicState('listening');
      } else {
        // First press of the session: create instance and trigger permission dialog
        startRec();
      }
    }

    function handleMicRelease(e) {
      if (e) e.preventDefault();
      recWanted = false;
      micReleasedAt = Date.now(); // For double-advance guard in onBodyClick
      // Immediate UI feedback: stop showing "listening"
      if (S.micState === 'listening') setMicState('idle');
      // Do NOT kill the recognition here. On file:// origins Chrome triggers a
      // new permission dialog for every new SpeechRecognition instance.
      // Keeping the same instance alive avoids repeated permission prompts.
    }
    function setMicState(s) { S.micState = s; renderVoiceUI(); }

    function renderVoiceUI() {
      const isL = S.micState === 'listening', isH = S.micState === 'heard',
        isP = S.micState === 'paused', isE = S.micState === 'error';
      const col = isE ? '#b03020' : isP ? 'rgba(44,44,44,.45)' : isH ? '#3a7c50' : isL ? '#618f1e' : '#3a4030';
      const btn = g('mic-btn');
      if (btn) {
        btn.style.background = isL ? `radial-gradient(circle at 40% 35%,${col}cc,${col})` : col;
        btn.style.boxShadow = isL ? `0 0 36px ${col}77` : '0 4px 14px rgba(0,0,0,.4)';
        btn.textContent = isH ? '✅' : isP ? '⏸' : isE ? '🚫' : '🎙️';
      }
      const r1 = g('mic-ring1'), r2 = g('mic-ring2');
      if (r1 && r2) { r1.style.display = r2.style.display = isL ? 'block' : 'none'; r1.style.background = r2.style.background = col; }
      const wr = g('wave-row'); if (wr) wr.style.display = isL ? 'flex' : 'none';
      const lbl = g('mic-label-text');
      if (lbl) lbl.textContent = isL ? 'はなしてください' : isH ? '' : isE ? '🚫 マイク許可をONにしてください' : '🎙️ 長押しして開始';
      const ta = g('transcript-area');
      if (ta) {
        if (isH && S.transcript) ta.innerHTML = `<div class="transcript-pill glass anim-heard"><span class="heard-text">✅「${esc(S.transcript)}」</span></div>`;
        else if (isL && S.interim) ta.innerHTML = `<div class="transcript-pill glass"><span class="interim-text">${esc(S.interim)}...</span></div>`;
        else if (isL) { const q = cq(); ta.innerHTML = `<span class="listen-hint">${S.chunkIdx >= (q ? q.chunks.length : 99) ? '最後のチャンクを話してください' : '英語で話してください'}</span>`; }
        else ta.innerHTML = '';
      }
    }

    /* ── Whisper / Stress Detection Logic (Ported from stress-poc.html) ── */
    async function startWhisperAudio() {
      if (S.micState === 'listening') return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        S.audioStream = stream; // Store so we can stop tracks later

        S.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        S.analyser = S.audioCtx.createAnalyser();
        S.analyser.fftSize = 2048;
        S.analyser.smoothingTimeConstant = 0;
        S.source = S.audioCtx.createMediaStreamSource(stream);
        S.source.connect(S.analyser);

        S.dataArray = new Float32Array(S.analyser.fftSize);
        S.startTime = performance.now();
        S.peakVal = 0;
        S.peakTime = 0;
        S.volumeHistory = [];
        S.audioChunks = [];

        // Prefer webm/opus (Chrome/Firefox); fall back to mp4 (Safari); last resort: browser default
        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
          ? 'audio/webm;codecs=opus'
          : MediaRecorder.isTypeSupported('audio/mp4')
            ? 'audio/mp4'
            : '';
        S.audioMimeType = mimeType;
        S.mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
        S.mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) S.audioChunks.push(e.data);
        };
        S.mediaRecorder.start();

        setMicState('listening');
        requestAnimationFrame(updateWhisperVisuals);
      } catch (err) {
        console.error("Whisper mic access denied", err);
        setMicState('error');
      }
    }

    function updateWhisperVisuals() {
      if (S.micState !== 'listening') return;
      requestAnimationFrame(updateWhisperVisuals);

      S.analyser.getFloatTimeDomainData(S.dataArray);
      let sumSquares = 0;
      for (let i = 0; i < S.dataArray.length; i++) sumSquares += S.dataArray[i] * S.dataArray[i];
      let rms = Math.sqrt(sumSquares / S.dataArray.length);
      let dB = rms > 0.001 ? 20 * Math.log10(rms) + 60 : 0;
      dB = Math.max(0, dB);

      let now = performance.now() - S.startTime;
      S.volumeHistory.push({ time: now, rms: rms, dB: dB });
      if (rms > S.peakVal) { S.peakVal = rms; S.peakTime = now; }
    }

    async function stopWhisperAudio() {
      // Return a well-shaped error object instead of undefined so callers can
      // safely access result.error without crashing.
      if (S.micState !== 'listening') return { error: 'Not recording' };
      setMicState('heard'); // Temporary state while processing

      await new Promise(resolve => {
        S.mediaRecorder.onstop = resolve;
        S.mediaRecorder.stop();
      });

      const result = await analyzeStress();

      // Disconnect Web Audio graph
      if (S.source) S.source.disconnect();
      if (S.audioCtx) S.audioCtx.close();

      // Release microphone — stop all tracks so the browser mic indicator disappears
      if (S.audioStream) {
        S.audioStream.getTracks().forEach(t => t.stop());
        S.audioStream = null;
      }

      return result;
    }

    async function analyzeStress() {
      if (S.volumeHistory.length === 0 || S.peakVal < 0.01) return { error: "No audio" };

      const audioBlob = new Blob(S.audioChunks, S.audioMimeType ? { type: S.audioMimeType } : {});
      const arrayBuffer = await audioBlob.arrayBuffer();
      const decodedBuffer = await S.audioCtx.decodeAudioData(arrayBuffer);

      const targetSampleRate = 16000;
      const resampleLength = Math.max(1, Math.ceil(decodedBuffer.length * targetSampleRate / decodedBuffer.sampleRate));
      const resampleCtx = new OfflineAudioContext(1, resampleLength, targetSampleRate);
      const bufferSource = resampleCtx.createBufferSource();
      bufferSource.buffer = decodedBuffer;
      bufferSource.connect(resampleCtx.destination);
      bufferSource.start();
      const resampledBuffer = await resampleCtx.startRendering();

      let whisperInput = resampledBuffer.getChannelData(0);
      let maxAbs = 0;
      for (let i = 0; i < whisperInput.length; i++) {
        if (Math.abs(whisperInput[i]) > maxAbs) maxAbs = Math.abs(whisperInput[i]);
      }
      if (maxAbs > 0.001) {
        const gain = 0.9 / maxAbs;
        for (let i = 0; i < whisperInput.length; i++) whisperInput[i] *= gain;
      }

      try {
        const output = await transcriber(whisperInput, { return_timestamps: 'word' });
        const transcriptWords = output.chunks;
        if (!transcriptWords || transcriptWords.length === 0) return { error: "No transcript" };

        const recordDuration = S.volumeHistory[S.volumeHistory.length - 1].time;
        const whisperDuration = transcriptWords[transcriptWords.length - 1].timestamp[1];
        const timeScale = recordDuration / whisperDuration;

        const speechStartTime = transcriptWords[0].timestamp[0] * timeScale;
        const speechEndTime = transcriptWords[transcriptWords.length - 1].timestamp[1] * timeScale;

        let windowPeakVal = 0;
        let windowPeakTime = 0;
        for (const sample of S.volumeHistory) {
          if (sample.time >= speechStartTime && sample.time <= speechEndTime) {
            if (sample.rms > windowPeakVal) {
              windowPeakVal = sample.rms;
              windowPeakTime = sample.time;
            }
          }
        }

        // Identify the word with the peak stress
        let stressedWord = null;
        for (const chunk of transcriptWords) {
          const wStart = chunk.timestamp[0] * timeScale;
          const wEnd = chunk.timestamp[1] * timeScale;
          if (windowPeakTime >= wStart && windowPeakTime <= wEnd) {
            stressedWord = chunk.text.trim();
            break;
          }
        }

        return {
          text: output.text,
          stressedWord: stressedWord,
          words: transcriptWords.map(w => ({ text: w.text.trim(), start: w.timestamp[0] * timeScale, end: w.timestamp[1] * timeScale }))
        };
      } catch (err) {
        console.error("Whisper analysis error:", err);
        return { error: err.message };
      }
    }

    /* ── Answer Controls ── */
    function speakAnswer() {
      const q = cq(); if (!q) return;
      if (ttsPlaying) { ttsStop(); return; }
      ttsStop();
      const u = new SpeechSynthesisUtterance(getAssembledSentence(q));
      u.lang = 'en-US'; u.rate = 0.85;
      ttsPlaying = true;
      g('speak-btn').textContent = '⏹️ 停止';
      u.onend = u.onerror = () => { ttsPlaying = false; ttsStop(); };
      speechSynthesis.speak(u);
    }

    /* ── Next Question & Session End ── */
    function runTreeAnimation(pct) {
      var canvas = document.getElementById('done-canvas');
      if (!canvas) return;
      if (window._tAF) { cancelAnimationFrame(window._tAF); window._tAF = null; }
      var ctx = canvas.getContext('2d');
      var W = 300, H = 200;
      canvas.width = W; canvas.height = H;

      var maxStage = pct >= 75 ? 3 : pct >= 50 ? 2 : pct >= 25 ? 1 : 0;
      var G = '#618f1e', GD = '#3d5a12', GL = '#8ab83a', TR = '#7a4826';

      var eOut = function(t){ return 1-(1-t)*(1-t)*(1-t); };
      var eIO  = function(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; };
      var bnc  = function(t){ return t<0.72 ? eOut(t/0.72)*1.15 : 1.15-0.15*eOut((t-0.72)/0.28); };
      var lerp = function(a,b,p){ return a+(b-a)*p; };
      var cl   = function(v){ return Math.max(0,Math.min(1,v)); };

      /* ── Timing map ── */
      var ms=0, M={};
      var seg = function(k,d){ M[k]=ms; ms+=d; };
      seg('bIdle',800); seg('bGather',400); seg('tPop',400);
      seg('tIdle', maxStage===0 ? 99999 : 700);
      if (maxStage>=1){ seg('tSpawn',500); seg('tGather',400); seg('btPop',400); seg('btIdle', maxStage===1 ? 99999 : 700); }
      if (maxStage>=2){ seg('btSpawn',500); seg('btGather',400); seg('fPop',400); seg('fIdle',99999); }

      var ph = function(a,b){ var d=(M[b]!==undefined ? M[b] : M[a]+1e9)-M[a]; return cl((el-M[a])/d); };

      /* ── Draw: Branch (Y-twig) ── */
      var drawBranch = function(x,y,sz,ang,alpha,sw){
        ctx.save(); ctx.globalAlpha=cl(alpha); ctx.translate(x,y);
        ctx.rotate(ang+Math.sin(sw*0.9)*0.07);
        ctx.strokeStyle=G; ctx.lineWidth=Math.max(1.5,sz*0.08); ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(0,sz*0.40); ctx.lineTo(0,0); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-sz*0.30,-sz*0.42); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo( sz*0.30,-sz*0.42); ctx.stroke();
        ctx.fillStyle=GL;
        [[0,sz*0.40],[-sz*0.30,-sz*0.42],[sz*0.30,-sz*0.42]].forEach(function(p){
          ctx.beginPath(); ctx.arc(p[0],p[1],sz*0.10,0,Math.PI*2); ctx.fill();
        });
        ctx.restore();
      };

      /* ── Draw: Tree (3-layer) ── */
      /* Each layer: [base_width, base_y, apex_y, color] */
      var drawTree = function(x,y,sz,alpha,sw){
        ctx.save(); ctx.globalAlpha=cl(alpha); ctx.translate(x,y);
        ctx.transform(1,0,Math.sin(sw*0.65)*0.012,1,0,0); /* horizontal sway */
        ctx.fillStyle=TR; ctx.fillRect(-sz*0.07,0,sz*0.14,sz*0.30);
        [[sz*0.72, sz*0.02,-sz*0.50,GL],
         [sz*0.60,-sz*0.42,-sz*0.80,G ],
         [sz*0.44,-sz*0.74,-sz*1.05,GD]].forEach(function(L){
          ctx.fillStyle=L[3]; ctx.beginPath();
          ctx.moveTo(0,L[2]); ctx.lineTo(-L[0]/2,L[1]); ctx.lineTo(L[0]/2,L[1]);
          ctx.closePath(); ctx.fill();
        });
        ctx.restore();
      };

      /* ── Draw: Big tree (4-layer) ── */
      var drawBigTree = function(x,y,sz,alpha,sw){
        ctx.save(); ctx.globalAlpha=cl(alpha); ctx.translate(x,y);
        ctx.transform(1,0,Math.sin(sw*0.50)*0.009,1,0,0);
        ctx.fillStyle=TR; ctx.fillRect(-sz*0.09,0,sz*0.18,sz*0.34);
        [[sz*0.80, sz*0.02,-sz*0.42,GL],
         [sz*0.72,-sz*0.36,-sz*0.74,GL],
         [sz*0.60,-sz*0.68,-sz*1.07,G ],
         [sz*0.46,-sz*1.01,-sz*1.38,GD]].forEach(function(L){
          ctx.fillStyle=L[3]; ctx.beginPath();
          ctx.moveTo(0,L[2]); ctx.lineTo(-L[0]/2,L[1]); ctx.lineTo(L[0]/2,L[1]);
          ctx.closePath(); ctx.fill();
        });
        ctx.restore();
      };

      /* Sparkles pool (stage 3) */
      var sparks=[];
      for(var si=0;si<14;si++) sparks.push({x:20+Math.random()*260,y:15+Math.random()*170,ph:Math.random()*Math.PI*2,spd:0.6+Math.random()*0.8});

      var start=performance.now(), el=0;

      var frame = function(now){
        el = now - start;
        ctx.clearRect(0,0,W,H);
        var sw = el/1000; /* sway timer (seconds) */

        /* ── BRANCHES ── */
        if (el < M.tPop+400) {
          [[72,148,30,-0.25],[150,155,27,0.10],[228,146,29,0.35],[113,118,25,-0.10]].forEach(function(b,i){
            var x=b[0],y=b[1],sz=b[2],ang=b[3],a=1,s=sw+i*0.65;
            if (el < M.bGather){
              x+=Math.sin(s*0.85+i)*3; y+=Math.cos(s*0.65+i)*2;
            } else if (el < M.tPop){
              var p=eIO(ph('bGather','tPop')); x=lerp(b[0],150,p); y=lerp(b[1],162,p); a=1-p;
            } else return;
            drawBranch(x,y,sz,ang,a,s);
          });
        }

        /* ── CENTER TREE ── */
        if (el >= M.tPop) {
          var tsc=1, ta=1;
          if (el<M.tPop+400){ var tp=cl((el-M.tPop)/400); tsc=bnc(tp); ta=eOut(tp); }
          else if (maxStage>=1 && M.tGather!==undefined && el>=M.tGather){ var tg=eIO(ph('tGather','btPop')); ta=1-tg; }
          if (ta>0.01){ ctx.save(); ctx.translate(150,162); ctx.scale(tsc,tsc); drawTree(0,0,60,ta,sw); ctx.restore(); }
        }

        /* ── SIDE TREES (gathering before big tree) ── */
        if (maxStage>=1 && M.tSpawn!==undefined && el>=M.tSpawn && el<M.btPop+400) {
          var sp=eOut(ph('tSpawn','tGather'));
          [[62,164],[238,164]].forEach(function(s,i){
            var x=s[0],y=s[1],a=sp,sc=sp;
            if (M.tGather!==undefined && el>=M.tGather){
              var p=eIO(ph('tGather','btPop')); x=lerp(s[0],150,p); y=lerp(s[1],162,p); a=1-p; sc=lerp(1,0.4,p);
            }
            if (a>0.01){ ctx.save(); ctx.translate(x,y); ctx.scale(sc,sc); drawTree(0,0,46,a,sw+i*0.9); ctx.restore(); }
          });
        }

        /* ── BIG TREE ── */
        if (maxStage>=1 && M.btPop!==undefined && el>=M.btPop) {
          var bsc=1, ba=1;
          if (el<M.btPop+400){ var bp=cl((el-M.btPop)/400); bsc=bnc(bp); ba=eOut(bp); }
          else if (maxStage>=2 && M.btGather!==undefined && el>=M.btGather){ var bg=eIO(ph('btGather','fPop')); ba=1-bg; }
          if (ba>0.01){ ctx.save(); ctx.translate(150,166); ctx.scale(bsc,bsc); drawBigTree(0,0,72,ba,sw); ctx.restore(); }
        }

        /* ── SIDE BIG TREES (gathering before forest) ── */
        if (maxStage>=2 && M.btSpawn!==undefined && el>=M.btSpawn && el<M.fPop+400) {
          var sp2=eOut(ph('btSpawn','btGather'));
          [[56,168],[244,168]].forEach(function(s,i){
            var x=s[0],y=s[1],a=sp2,sc=sp2;
            if (M.btGather!==undefined && el>=M.btGather){
              var p=eIO(ph('btGather','fPop')); x=lerp(s[0],150,p); y=lerp(s[1],166,p); a=1-p; sc=lerp(1,0.4,p);
            }
            if (a>0.01){ ctx.save(); ctx.translate(x,y); ctx.scale(sc,sc); drawBigTree(0,0,56,a,sw+i*0.7); ctx.restore(); }
          });
        }

        /* ── FOREST ── */
        if (maxStage>=2 && M.fPop!==undefined && el>=M.fPop) {
          var fsc=1, fa=1;
          if (el<M.fPop+400){ var fp2=cl((el-M.fPop)/400); fsc=bnc(fp2); fa=eOut(fp2); }
          if (fa>0.01){
            ctx.save(); ctx.translate(150,168); ctx.scale(fsc,fsc);
            /* Draw back trees first, then front (z-order by size) */
            [[-94,36,1.1],[96,36,0.8],[-48,50,0.9],[50,48,1.2],[0,62,1.0]].forEach(function(f){
              drawTree(f[0],0,f[1],fa,sw*f[2]);
            });
            ctx.restore();
          }
          /* Sparkles (stage 3 / max score) */
          if (maxStage===3 && el>M.fPop+500) {
            sparks.forEach(function(sp){
              var a=(Math.sin(el/380*sp.spd+sp.ph)+1)/2*0.50;
              var r=2.5+Math.sin(el/290*sp.spd+sp.ph)*1.2;
              ctx.save(); ctx.globalAlpha=a; ctx.fillStyle='#f0c43a'; ctx.beginPath();
              for(var j=0;j<8;j++){
                var ag=j*Math.PI/4, rv=j%2===0 ? r : r*0.38;
                if(j===0) ctx.moveTo(sp.x+Math.cos(ag)*rv, sp.y+Math.sin(ag)*rv);
                else ctx.lineTo(sp.x+Math.cos(ag)*rv, sp.y+Math.sin(ag)*rv);
              }
              ctx.closePath(); ctx.fill(); ctx.restore();
            });
          }
        }

        window._tAF = requestAnimationFrame(frame);
      };

      window._tAF = requestAnimationFrame(frame);
    }

    function nextQuestion() {
      const q = cq(); if (!q) return;
      // Tally addition-chunk scores for this question
      q.chunks.slice(1).forEach((chunk, i) => {
        const t = S.transcriptHistory[i + 1];
        S.chunkTotal++;
        if (t && chunkIsOk(t, chunk)) S.chunkOk++;
      });
      if (S.qIdx + 1 < S.queue.length) {
        S.qIdx++; S.chunkIdx = 1; S.showAnswer = false;
        S.transcript = ''; S.interim = ''; S.transcriptHistory = {};
        S.micState = 'idle';
        renderPractice();
      } else {
        const pct = S.chunkTotal > 0 ? Math.round(S.chunkOk / S.chunkTotal * 100) : 0;
        const stats = loadStats();
        stats.sessions = (stats.sessions || 0) + 1;
        stats.totalQ = (stats.totalQ || 0) + S.queue.length;
        stats.chunkOk = (stats.chunkOk || 0) + S.chunkOk;
        stats.chunkTotal = (stats.chunkTotal || 0) + S.chunkTotal;
        saveStats(stats);
        // Update home mini-stats
        g('stat-sessions').textContent = stats.sessions;
        g('stat-total').textContent = stats.totalQ;
        const lifePct = stats.chunkTotal > 0 ? Math.round(stats.chunkOk / stats.chunkTotal * 100) + '%' : '—';
        g('stat-perfect').textContent = lifePct;
        // Done screen
        g('done-sub').textContent = `${S.queue.length}問 完了`;
        g('done-score-pct').textContent = pct + '%';
        g('done-score-detail').textContent = `${S.chunkOk} / ${S.chunkTotal} チャンク`;
        killRec();
        showScreen('done');
        setTimeout(function(){ runTreeAnimation(pct); }, 50);
      }
    }

    /* ── Keyboard ── */
    document.addEventListener('keydown', e => {
      if (!g('screen-practice').classList.contains('active')) return;
      if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); if (!S.showAnswer) advance(); }
    });

    /* ── Init ── */
    if (window.CHUNK_DATA) {
      DATA = window.CHUNK_DATA;
    } else {
      document.body.innerHTML = '<div style="color:#f87171;padding:40px;font-size:18px;font-family:sans-serif">⚠️ data.js が読み込めませんでした。<br>chunking-dojo.html と同じフォルダに data.js があるか確認してください。</div>';
    }
    refreshHome();
    maybeShowOnboarding();
  </script>
